services:

  db:
    container_name: logcenter_db
    image: "postgres:18"
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
    shm_size: '256m' # Necessary to use Postgres VACUUM. You can increment it as you need
    volumes:
      - ./data/db/:/var/lib/postgresql/data/

  server:
    build: ./src/server
    container_name: logcenter_server
    #image:
    restart: always
    environment:
      DB_HOST: db
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_LISTEN: http://0.0.0.0:9200
      JWT_KEY: ${JWT_KEY}
    depends_on:
      - db
    ports:
      - ${LOGCENTER_PORT}:9200

  client:
    container_name: logcenter_client
    restart: always
    build:
      context: ./src/client
      dockerfile: Dockerfile
    environment:
      VITE_API_HOST: ${SERVER_BACKEND_URL}
      #TZ -> THE SERVER MUST BE ON UTC+0
    ports:
      - "5173:5173"
    depends_on:
      - server
